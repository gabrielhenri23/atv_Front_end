<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Distribuidora Pet Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Topo -->
    <header class="header1 container-fluid">
        <div class="row d-flex p-3">
            <div class="col-4 d-flex align-items-center"><i class="fa-solid fa-bars white"></i></div>
            <!-- Bars do font-awesome -->
            <div class="col-4 d-flex justify-content-center fa-xl"><img src="./img/logo-mobile.png"
                    alt="Distribuidora Pet Shop"></div>
            <div class="col-4 d-flex align-items-center justify-content-end white"><i
                    class="fa-solid fa-cart-arrow-down fa-xl"></i></div> <!-- Cart-Shop Font-awesome -->
        </div>
    </header>
    <!-- Topo-Pesquisa -->
    <div class="barra">
        <!-- caixa de input bootstrap -->
        <div class="col-11">
            <input class="form-control fw-bold " type=" text" value="O que você está procurando?"
                aria-label="readonly input example" readonly>
        </div>
        <!-- search font awesome -->
        <div class="col-1">
            <a href><i class="fa-solid fa-magnifying-glass fa-xl" style="color: rgb(1, 27, 78);"></i></a>
        </div>
    </div>

    <!-- Info de brinquedos para pets -->

    <div>
        <ul class="barra_info_pet">
            <li type="buttom"> <a href="Kits" class="caixa"> Kits</a>
            <li>
            <li type="buttom"><a href="Brinquedos" class="caixa2">Brinquedos</a>
            </li>
        </ul>
        <!-- carrosel do bootstrap -->
        <div id="carouselExampleFade" class="carousel slide carousel-fade">
            <div class="carousel-inner">

                <!-- Card 1 -->
                <div class="carousel-item active">
                    <!-- cards -->
                    <div class="carousel-item active">
                        <div class="row justify-content-center">

                            <div class="col-md-5">
                                <div class="card">
                                    <img src="img1.jpg" class="card-img-top" alt="">
                                    <div class="card-body">
                                        <h5 class="card-title">Card 1</h5>
                                        <p class="card-text">Descrição do card 1.</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-5">
                                <div class="card">
                                    <img src="img2.jpg" class="card-img-top" alt="">
                                    <div class="card-body">
                                        <h5 class="card-title">Card 2</h5>
                                        <p class="card-text">Descrição do card 2.</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="carousel-item">
                <div class="card mx-auto" style="width: 22rem;">
                    <img src="https://via.placeholder.com/350x200" class="card-img-top" alt="Imagem 2">
                    <div class="card-body">
                        <h5 class="card-title">Card 2</h5>
                        <p class="card-text">Descrição do segundo card.</p>
                        <a href="#" class="btn btn-primary">Saiba mais</a>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="carousel-item">
                <div class="card mx-auto" style="width: 22rem;">
                    <img src="https://via.placeholder.com/350x200" class="card-img-top" alt="Imagem 3">
                    <div class="card-body">
                        <h5 class="card-title">Card 3</h5>
                        <p class="card-text">Descrição do terceiro card.</p>
                        <a href="#" class="btn btn-primary">Saiba mais</a>
                    </div>
                </div>
            </div>

        </div>

        <!-- Botão anterior -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
            <span class="carousel-control-prev-icon bg-dark rounded-circle p-3 bt_carousel1" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>

        <!-- Botão próximo -->
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
            <span class="carousel-control-next-icon bg-dark rounded-circle p-3 bt_carousel2" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
