<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Distribuidora Pet Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Topo -->
    <header class="header1 container-fluid">
        <div class="row d-flex p-3">
            <div class="col-4 d-flex align-items-center"><i class="fa-solid fa-bars white"></i></div>
            <!-- Bars do font-awesome -->
            <div class="col-4 d-flex justify-content-center fa-xl"><img src="./img/logo-mobile.png"
                    alt="Distribuidora Pet Shop"></div>
            <div class="col-4 d-flex align-items-center justify-content-end white"><i
                    class="fa-solid fa-cart-arrow-down fa-xl"></i></div> <!-- Cart-Shop Font-awesome -->
        </div>
    </header>
    <!-- Topo-Pesquisa -->
    <div class="barra">
        <!-- caixa de input bootstrap -->
        <div class="col-11">
            <input class="form-control fw-bold"" type=" text" value="O que você está procurando?"
                aria-label="readonly input example" readonly>
        </div>
        <!-- search font awesome -->
        <div class="col-1 a">
            <a href><i class="fa-solid fa-magnifying-glass fa-xl" style="color: rgb(1, 27, 78);"></i></a>
        </div>
    </div>

    <!-- Info de brinquedos para pets -->

   <nav class="barra_info_pet">
    <!-- bootom bootstrap -->
    <button type="butto" class="btn btn-danger p-2 m-2"> <h3>KITS</h3></button>
    <h1 class="text-uppercase">brinquedos</h1>
   </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
